<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💗</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background: linear-gradient(-45deg, #ff7aa2, #ff4d6d, #ff85a2);
  background-size: 400% 400%;
  animation: fondo 15s ease infinite;
  color:white;
}

@keyframes fondo{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.app{
  width:360px;
  height:640px;
  border-radius:30px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  box-shadow:0 30px 80px rgba(0,0,0,0.4);
  overflow:hidden;
  position:relative;
}

.header{
  text-align:center;
  padding:15px;
  font-weight:bold;
  background:#ffffff22;
}

.screen{
  padding:25px;
  text-align:center;
  animation: aparecer 0.5s ease;
}

@keyframes aparecer{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:15px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.main{background:white;color:#ff4d6d;}
.yes{background:#22c55e;}
.no{background:#ef4444;position:relative;}

.music{
  position:absolute;
  top:10px;
  right:10px;
  width:40px;
  height:40px;
  border-radius:50%;
  background:#00000033;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.3s;
}

.music.playing{
  transform: rotate(360deg);
}

.heart{
  position:absolute;
  font-size:20px;
  animation: float 5s linear forwards;
}

@keyframes float{
  0%{transform:translateY(0); opacity:1;}
  100%{transform:translateY(-700px); opacity:0;}
}

.final{
  animation: finalAnim 0.8s ease;
}

@keyframes finalAnim{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="app">

<div class="music" onclick="toggleMusic()">🎵</div>

<audio id="music" preload="auto">
  <source src="./voy amarte.mp3" type="audio/mpeg">
</audio>

<div class="header">💗 Para ti</div>

<div id="s1" class="screen">
  <h2>Tengo algo importante que decirte…</h2>
  <button class="main" onclick="go(2)">Continuar</button>
</div>

<div id="s2" class="screen" style="display:none">
  <p>
    No soy mucho de decir esto así,<br><br>

    pero contigo todo se siente diferente.<br><br>

    Me gusta cómo hablamos,<br>
    cómo nos entendemos,<br>
    y cómo fluye todo contigo.<br><br>

    Y no quiero quedarme con la duda…
  </p>
  <button class="main" onclick="go(3)">Seguir</button>
</div>

<div id="s3" class="screen" style="display:none">
  <h2>¿Te gustaría ser mi novia?</h2>

  <button class="yes" onclick="yes()">Sí 💗</button>
  <button class="no" id="noBtn" onmouseover="move()">No 😅</button>
</div>

</div>

<script>
function go(n){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById("s"+n).style.display="block";
}

function move(){
  const b=document.getElementById("noBtn");
  b.style.transform=`translate(${Math.random()*120-60}px,${Math.random()*80-40}px)`;
}

function particles(){
  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="heart";
    p.innerHTML="💗";
    p.style.left=Math.random()*100+"%";
    p.style.bottom="0";
    p.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),5000);
  }
}

function yes(){
  document.getElementById("s3").innerHTML=`
    <div class="final">
      <h2>💗 Me haces muy feliz</h2>

      De verdad me gusta lo que tenemos…<br><br>

      y quiero intentar algo bonito contigo,<br>
      sin presión, pero con intención.<br><br>

      No perfecto… pero sí real.<br><br>

      Y contigo, vale completamente la pena 💗
    </div>
  `;
  particles();
}

/* 🎵 MÚSICA FINAL */
let playing=false;

function toggleMusic(){
  const m=document.getElementById("music");
  const btn=document.querySelector(".music");

  if(!playing){

    m.volume = 0.2;

    m.play().then(()=>{
      m.currentTime = 34; // ⏩ empieza en segundo 30
    });

    btn.classList.add("playing");
    playing=true;

  }else{
    m.pause();
    btn.classList.remove("playing");
    playing=false;
  }
}
</script>

</body>
</html>
